name: Publish to ClawHub

on:
  push:
    branches: [main]

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install ClawHub CLI
        run: npm install -g clawhub

      - name: Publish to ClawHub
        env:
          CLAWHUB_TOKEN: ${{ secrets.CLAWHUB_TOKEN }}
        run: |
          clawhub auth login --token "$CLAWHUB_TOKEN" --no-browser
          VERSION=$(jq -r .version skill.json)
          OUTPUT=$(clawhub publish . --slug tapauth --name "TapAuth" --version "$VERSION" --changelog "Synced from monorepo" 2>&1) && {
            echo "$OUTPUT"
            echo "✅ Published tapauth@$VERSION"
          } || {
            echo "$OUTPUT"
            if echo "$OUTPUT" | grep -q "Version already exists"; then
              echo "⏭️ Version $VERSION already published — skipping. Bump version in skill.json to publish a new release."
              exit 0
            fi
            exit 1
          }
